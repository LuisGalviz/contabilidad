name: CI/CD

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend – lint, type-check, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy src

      - name: Tests
        env:
          APP_SECRET_KEY: test-secret-key-for-ci-only
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: pytest --cov=src --cov-report=xml

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  frontend:
    name: Frontend – lint, type-check, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  deploy-backend:
    name: Deploy backend → ECS
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # El repositorio ECR no lo creaba ningún script — se creó a mano la
      # primera vez. Al migrar de cuenta AWS eso deja el pipeline roto, así
      # que se crea aquí de forma idempotente.
      - name: Asegurar repositorio ECR
        run: |
          aws ecr describe-repositories --repository-names contaflow-backend --region us-east-1 >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name contaflow-backend --region us-east-1
          aws ecr put-lifecycle-policy \
            --repository-name contaflow-backend --region us-east-1 \
            --lifecycle-policy-text '{"rules":[{"rulePriority":1,"description":"Mantener solo las ultimas 10 imagenes","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}' >/dev/null

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/contaflow-backend:$IMAGE_TAG \
                       -t $ECR_REGISTRY/contaflow-backend:latest \
                       ./backend --target production
          docker push $ECR_REGISTRY/contaflow-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/contaflow-backend:latest

      - name: Deploy to ECS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          set -e
          REGION="us-east-1"
          # Se deriva de las credenciales del CI en vez de hardcodearlo, para
          # que el pipeline funcione sin cambios al migrar de cuenta AWS.
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          IMAGE="$ECR_REGISTRY/contaflow-backend:$IMAGE_TAG"

          # IAM execution role (idempotent)
          aws iam create-role --role-name contaflow-exec-role \
            --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"ecs-tasks.amazonaws.com"},"Action":"sts:AssumeRole"}]}' \
            --region $REGION 2>/dev/null || true
          aws iam attach-role-policy --role-name contaflow-exec-role \
            --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy \
            2>/dev/null || true

          # CloudWatch log group (idempotent)
          aws logs create-log-group --log-group-name /ecs/contaflow-backend --region $REGION 2>/dev/null || true
          aws logs put-retention-policy --log-group-name /ecs/contaflow-backend \
            --retention-in-days 30 --region $REGION 2>/dev/null || true

          # ECS cluster (idempotent)
          aws ecs create-cluster --cluster-name contaflow --region $REGION 2>/dev/null || true

          # Default VPC + subnets
          VPC=$(aws ec2 describe-vpcs --filters Name=isDefault,Values=true \
            --query "Vpcs[0].VpcId" --output text --region $REGION)
          # us-east-1e no ofrece capacidad Fargate: si su subnet entra en la
          # lista, create-service falla de forma intermitente al programar la
          # tarea en esa AZ. Se excluye explícitamente.
          SUBNETS=$(aws ec2 describe-subnets --filters Name=defaultForAz,Values=true \
            --query "Subnets[?AvailabilityZone!='us-east-1e'].SubnetId" \
            --output text --region $REGION | tr '\t' ',')

          # Security group (idempotent)
          SG=$(aws ec2 describe-security-groups \
            --filters Name=group-name,Values=contaflow-ecs-sg Name=vpc-id,Values=$VPC \
            --query "SecurityGroups[0].GroupId" --output text --region $REGION 2>/dev/null || echo "")
          if [ -z "$SG" ] || [ "$SG" = "None" ]; then
            SG=$(aws ec2 create-security-group \
              --group-name contaflow-ecs-sg \
              --description "ContaFlow ECS tasks" \
              --vpc-id $VPC --query "GroupId" --output text --region $REGION)
            aws ec2 authorize-security-group-ingress \
              --group-id $SG --protocol tcp --port 8000 --cidr 0.0.0.0/0 --region $REGION 2>/dev/null || true
          fi

          # El security group del RDS no conoce al de ECS: sin esta regla las
          # tareas Fargate no pueden abrir la conexión a Postgres y el
          # contenedor muere en el arranque. Idempotente.
          RDS_SG=$(aws rds describe-db-instances --db-instance-identifier contaflow-db \
            --query "DBInstances[0].VpcSecurityGroups[0].VpcSecurityGroupId" \
            --output text --region $REGION 2>/dev/null || echo "")
          if [ -n "$RDS_SG" ] && [ "$RDS_SG" != "None" ]; then
            aws ec2 authorize-security-group-ingress \
              --group-id "$RDS_SG" --protocol tcp --port 5432 \
              --source-group "$SG" --region $REGION 2>/dev/null || true
          fi

          # Task definition
          TASK_ARN=$(aws ecs register-task-definition \
            --family contaflow-backend \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu 512 --memory 1024 \
            --execution-role-arn arn:aws:iam::${ACCOUNT}:role/contaflow-exec-role \
            --region $REGION \
            --container-definitions "[
              {
                \"name\": \"contaflow-backend\",
                \"image\": \"${IMAGE}\",
                \"portMappings\": [{\"containerPort\": 8000, \"protocol\": \"tcp\"}],
                \"essential\": true,
                \"environment\": [
                  {\"name\": \"APP_ENV\",        \"value\": \"production\"},
                  {\"name\": \"DATABASE_URL\",   \"value\": \"${DATABASE_URL}\"},
                  {\"name\": \"APP_SECRET_KEY\", \"value\": \"${APP_SECRET_KEY}\"},
                  {\"name\": \"JWT_SECRET_KEY\", \"value\": \"${JWT_SECRET_KEY}\"}
                ],
                \"logConfiguration\": {
                  \"logDriver\": \"awslogs\",
                  \"options\": {
                    \"awslogs-group\": \"/ecs/contaflow-backend\",
                    \"awslogs-region\": \"${REGION}\",
                    \"awslogs-stream-prefix\": \"ecs\"
                  }
                }
              }
            ]" \
            --query "taskDefinition.taskDefinitionArn" --output text)

          # Migraciones Alembic antes de rotar el servicio.
          # Se ejecutan como tarea puntual en Fargate y no desde el runner de
          # Actions: la IP del runner es dinámica, y abrir el 5432 del RDS a
          # 0.0.0.0/0 para cada deploy sería peor. La tarea usa el mismo SG de
          # ECS, que ya es el único origen autorizado en el SG del RDS.
          MIGRATION_TASK=$(aws ecs run-task \
            --cluster contaflow \
            --task-definition "$TASK_ARN" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SG}],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"contaflow-backend","command":["alembic","upgrade","head"]}]}' \
            --region $REGION --query "tasks[0].taskArn" --output text)

          echo "Migración lanzada: $MIGRATION_TASK"
          aws ecs wait tasks-stopped --cluster contaflow --tasks "$MIGRATION_TASK" --region $REGION

          MIGRATION_EXIT=$(aws ecs describe-tasks --cluster contaflow --tasks "$MIGRATION_TASK" \
            --region $REGION --query "tasks[0].containers[0].exitCode" --output text)

          if [ "$MIGRATION_EXIT" != "0" ]; then
            echo "::error::Las migraciones fallaron (exit ${MIGRATION_EXIT}). Revisa CloudWatch /ecs/contaflow-backend. No se rota el servicio."
            exit 1
          fi
          echo "Migraciones aplicadas correctamente."

          # Create or update service
          ACTIVE=$(aws ecs describe-services --cluster contaflow --services contaflow-backend \
            --region $REGION --query "services[?status=='ACTIVE']|length(@)" --output text 2>/dev/null || echo 0)

          if [ "$ACTIVE" = "1" ]; then
            aws ecs update-service --cluster contaflow --service contaflow-backend \
              --task-definition "$TASK_ARN" --force-new-deployment --region $REGION
          else
            aws ecs create-service \
              --cluster contaflow \
              --service-name contaflow-backend \
              --task-definition "$TASK_ARN" \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SG}],assignPublicIp=ENABLED}" \
              --health-check-grace-period-seconds 90 \
              --region $REGION
          fi

      # ECS Fargate (sin load balancer) asigna una IP pública nueva a cada
      # tarea reemplazada — sin este paso, BACKEND_URL en Vercel queda
      # apuntando a una IP muerta después de cada deploy y el frontend
      # empieza a devolver 502 en todas las llamadas a la API.
      - name: Detectar IP pública de la nueva tarea ECS
        id: ecs-ip
        run: |
          set -e
          REGION="us-east-1"

          aws ecs wait services-stable --cluster contaflow --services contaflow-backend --region $REGION

          TASK_ARN=$(aws ecs list-tasks --cluster contaflow --service-name contaflow-backend \
            --desired-status RUNNING --region $REGION --query "taskArns[0]" --output text)

          ENI_ID=$(aws ecs describe-tasks --cluster contaflow --tasks "$TASK_ARN" --region $REGION \
            --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value | [0]" --output text)

          PUBLIC_IP=$(aws ec2 describe-network-interfaces --network-interface-ids "$ENI_ID" --region $REGION \
            --query "NetworkInterfaces[0].Association.PublicIp" --output text)

          if [ -z "$PUBLIC_IP" ] || [ "$PUBLIC_IP" = "None" ]; then
            echo "::error::No se pudo determinar la IP pública de la tarea ECS ($TASK_ARN, ENI $ENI_ID)."
            exit 1
          fi

          echo "backend_url=http://${PUBLIC_IP}:8000" >> "$GITHUB_OUTPUT"

      - name: Actualizar BACKEND_URL en Vercel y redesplegar frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BACKEND_URL: ${{ steps.ecs-ip.outputs.backend_url }}
        working-directory: frontend
        run: |
          set -e
          npx --yes vercel@latest link --yes --project contabilidad --token="$VERCEL_TOKEN"
          npx --yes vercel@latest env rm BACKEND_URL production --yes --token="$VERCEL_TOKEN" || true
          echo -n "$BACKEND_URL" | npx --yes vercel@latest env add BACKEND_URL production --token="$VERCEL_TOKEN"
          npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
