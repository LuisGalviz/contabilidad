name: Setup RDS database (run once)

on:
  workflow_dispatch:

jobs:
  setup-rds:
    name: Create RDS PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create RDS PostgreSQL
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          set -e
          REGION="us-east-1"

          # Subnet group using default VPC subnets.
          # us-east-1e no ofrece db.t3.micro — si entra en el subnet group, la
          # creación de la instancia falla por AZ sin capacidad.
          SUBNETS=$(aws ec2 describe-subnets \
            --filters Name=defaultForAz,Values=true \
            --query "Subnets[?AvailabilityZone!='us-east-1e'].SubnetId" \
            --output text --region $REGION | tr '\t' ' ')

          aws rds create-db-subnet-group \
            --db-subnet-group-name contaflow-subnet-group \
            --db-subnet-group-description "ContaFlow" \
            --subnet-ids $SUBNETS --region $REGION 2>/dev/null || echo "subnet group already exists"

          # Security group propio del RDS. Sin esto la instancia hereda el SG
          # default de la VPC, que no permite entrada desde las tareas ECS.
          VPC=$(aws ec2 describe-vpcs --filters Name=isDefault,Values=true \
            --query "Vpcs[0].VpcId" --output text --region $REGION)
          RDS_SG=$(aws ec2 describe-security-groups \
            --filters Name=group-name,Values=contaflow-rds-sg Name=vpc-id,Values=$VPC \
            --query "SecurityGroups[0].GroupId" --output text --region $REGION 2>/dev/null || echo "")
          if [ -z "$RDS_SG" ] || [ "$RDS_SG" = "None" ]; then
            RDS_SG=$(aws ec2 create-security-group \
              --group-name contaflow-rds-sg --description "ContaFlow RDS" \
              --vpc-id $VPC --query GroupId --output text --region $REGION)
          fi

          # Create RDS (free tier).
          # backup-retention-period: el plan Free Tier nuevo rechaza valores
          # altos con FreeTierRestrictionError — 1 día es el máximo permitido.
          aws rds create-db-instance \
            --db-instance-identifier contaflow-db \
            --db-instance-class db.t3.micro \
            --engine postgres \
            --engine-version "16.14" \
            --master-username contaflow \
            --master-user-password "$DB_PASSWORD" \
            --db-name contaflow \
            --allocated-storage 20 \
            --storage-type gp2 \
            --vpc-security-group-ids $RDS_SG \
            --db-subnet-group-name contaflow-subnet-group \
            --publicly-accessible \
            --no-multi-az \
            --backup-retention-period 1 \
            --region $REGION 2>/dev/null || echo "RDS instance already exists"

          echo "Waiting for RDS (~5-10 min)..."
          aws rds wait db-instance-available \
            --db-instance-identifier contaflow-db --region $REGION

          HOST=$(aws rds describe-db-instances \
            --db-instance-identifier contaflow-db \
            --query "DBInstances[0].Endpoint.Address" \
            --output text --region $REGION)

          echo ""
          echo "====================================================="
          echo "RDS ready. Add these 3 secrets to GitHub Actions:"
          echo ""
          echo "DATABASE_URL=postgresql+asyncpg://contaflow:${DB_PASSWORD}@${HOST}:5432/contaflow"
          echo "APP_SECRET_KEY=$(openssl rand -hex 32)"
          echo "JWT_SECRET_KEY=$(openssl rand -hex 32)"
          echo "====================================================="
