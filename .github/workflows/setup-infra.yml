name: Setup AWS Infrastructure (run once)

on:
  workflow_dispatch:

jobs:
  setup:
    name: Create ECS + RDS infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (admin)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ADMIN_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ADMIN_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run infrastructure setup
        run: bash infra/setup-ecs.sh
